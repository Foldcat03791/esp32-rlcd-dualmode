esphome:
  name: rlcd-dualmode
  friendly_name: "RLCD Dual Mode"
  on_boot:
    priority: 600
    then:
      - lambda: id(g_mode) = 0;
      - lambda: id(g_work_status) = 0;
      - lambda: id(g_work_duration) = 0;
      - delay: 500ms
      - component.update: my_display
      - delay: 15s
      - script.execute: fetch_weather_script

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

logger:
  level: INFO

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "RLCD-Fallback"
    password: "12345678"

captive_portal:

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

spi:
  clk_pin: GPIO11
  mosi_pin: GPIO12

i2c:
  sda: GPIO13
  scl: GPIO14
  scan: true
  id: bus_a

external_components:
  - source:
      type: local
      path: ./ESPHome-ST7305-RLCD/components
    components: [ st7305_rlcd ]
    refresh: 0s

http_request:
  id: http_client
  useragent: "esphome/rlcd"
  verify_ssl: false

time:
  - platform: sntp
    id: my_time
    timezone: "Asia/Shanghai"
    on_time:
      - minutes: 0
        hours: '*'
        then:
          - script.execute: fetch_weather_script
      - seconds: /120
        then:
          - component.update: my_display
  - platform: pcf85063
    id: pcf_time
    update_interval: 120s

script:
  - id: fetch_weather_script
    mode: restart
    then:
      - http_request.get:
          url: "https://api.openweathermap.org/data/2.5/weather?id=7843638&appid=af8978b4b02a74678d7249baf9b7c0aa&units=metric"
          capture_response: true
          on_response:
            then:
              - lambda: |-
                  ESP_LOGD("weather", "Response: %s", body.c_str());
                  auto doc = json::parse_json(body);
                  if (!doc.isNull()) {
                    float temp_val = doc["main"]["temp"];
                    int hum_val = doc["main"]["humidity"];
                    id(g_outdoor_temp) = temp_val;
                    id(g_outdoor_hum) = (float)hum_val;
                    std::string cond = doc["weather"][0]["main"];
                    std::string desc = doc["weather"][0]["description"];
                    id(g_weather_condition) = cond;
                    id(g_weather_desc) = desc;
                    ESP_LOGD("weather", "T=%.1f H=%d %s/%s", temp_val, hum_val, cond.c_str(), desc.c_str());
                  }
          on_error:
            then:
              - logger.log: "Weather fetch failed"
              - lambda: |-
                  ESP_LOGD("weather", "Using cached weather data");
                  id(g_weather_desc) = "Offline";
                  id(my_display).update();

sensor:
  - platform: shtcx
    address: 0x70
    update_interval: 120s
    i2c_id: bus_a
    temperature:
      name: "Temperature"
      id: temp_sensor
    humidity:
      name: "Humidity"
      id: hum_sensor

  - platform: adc
    id: bat_voltage
    name: "Battery Voltage"
    pin: GPIO4
    attenuation: 12db
    update_interval: 120s
    filters:
      - multiply: 3.0

  - platform: wifi_signal
    id: wifi_rssi
    name: "WiFi Signal"
    update_interval: 120s

globals:
  - id: g_mode
    type: uint8_t
    initial_value: "0"

  - id: g_work_status
    type: uint8_t
    initial_value: "0"

  - id: g_work_duration
    type: uint16_t
    initial_value: "0"

  - id: g_project
    type: std::string
    initial_value: "\"rlcd-project\""

  - id: g_todo_idx
    type: uint8_t
    initial_value: "0"

  - id: g_todo_state
    type: uint8_t
    initial_value: "0"
    restore_value: true

  - id: g_cached_temp
    type: float
    initial_value: "25.0"

  - id: g_cached_hum
    type: float
    initial_value: "50.0"

  - id: g_cached_bat
    type: float
    initial_value: "4.0"

  - id: g_cached_rssi
    type: int
    initial_value: "-50"

  - id: g_outdoor_temp
    type: float
    initial_value: "25.0"

  - id: g_outdoor_hum
    type: float
    initial_value: "50.0"

  - id: g_weather_condition
    type: std::string
    initial_value: "\"Sunny\""

  - id: g_weather_desc
    type: std::string
    initial_value: "\"Clear sky\""

  - id: g_branch
    type: std::string
    initial_value: "\"main\""

font:
  - file: "gfonts://VT323"
    id: font_display
    size: 48
    bpp: 1

  - file: "gfonts://VT323"
    id: font_headline
    size: 32
    bpp: 1

  - file: "gfonts://VT323"
    id: font_body
    size: 20
    bpp: 1

  - file: "gfonts://VT323"
    id: font_label
    size: 16
    bpp: 1

  - file: "gfonts://VT323"
    id: font_footer
    size: 14
    bpp: 1

image:
  - id: ic_sun
    file: "icons/weather-sunny.svg"
    resize: 40x40
    type: BINARY
  - id: ic_cloud
    file: "icons/cloud.svg"
    resize: 40x40
    type: BINARY
  - id: ic_rain
    file: "icons/weather-rainy.svg"
    resize: 40x40
    type: BINARY
  - id: ic_snow
    file: "icons/weather-snowy.svg"
    resize: 40x40
    type: BINARY
  - id: ic_thunder
    file: "icons/weather-lightning.svg"
    resize: 40x40
    type: BINARY
  - id: ic_fog
    file: "icons/weather-fog.svg"
    resize: 40x40
    type: BINARY
  - id: ic_cloud_sun
    file: "icons/weather-partly-cloudy.svg"
    resize: 40x40
    type: BINARY
  - id: ic_night
    file: "icons/weather-night.svg"
    resize: 40x40
    type: BINARY
  - id: ic_cloudy
    file: "icons/weather-cloudy.svg"
    resize: 40x40
    type: BINARY
  - id: ic_thermometer
    file: "icons/thermometer.svg"
    resize: 28x28
    type: BINARY
  - id: ic_humidity
    file: "icons/droplets.svg"
    resize: 28x28
    type: BINARY
  - id: ic_battery
    file: "icons/battery.svg"
    resize: 28x28
    type: BINARY
  - id: ic_battery_charging
    file: "icons/battery-charging.svg"
    resize: 28x28
    type: BINARY
  - id: ic_check
    file: "icons/check-circle.svg"
    resize: 24x24
    type: BINARY
  - id: ic_wifi
    file: "icons/wifi.svg"
    resize: 20x20
    type: BINARY

display:
  - platform: st7305_rlcd
    model: WAVESHARE_400X300
    id: my_display
    cs_pin: GPIO40
    dc_pin: GPIO5
    reset_pin: GPIO41
    data_rate: 1MHz
    update_interval: never
    lambda: |-
      uint8_t mode = id(g_mode);
      uint8_t st = id(g_work_status);
      int w = 400;
      int h = 300;

      auto bg = COLOR_ON;
      auto fg = COLOR_OFF;

      it.fill(bg);

      // ============ 赛博朋克边框系统 ============
      // 外层粗边框 (3px)
      it.filled_rectangle(0, 0, w, 3, fg);
      it.filled_rectangle(0, h - 3, w, 3, fg);
      it.filled_rectangle(0, 0, 3, h, fg);
      it.filled_rectangle(w - 3, 0, 3, h, fg);

      // ============ LIFE 模式 ============
      if (mode == 0) {
        auto now = id(my_time).now();

        // ============ 顶部状态栏 (20px) ============
        it.print(16, 6, id(font_headline), fg, TextAlign::TOP_LEFT, "LIFE");
        it.print(16, 38, id(font_footer), fg, TextAlign::TOP_LEFT, "// SYSTEM STATUS");

        // 右侧时间（加粗）
        if (now.is_valid()) {
          char time_buf[16];
          snprintf(time_buf, sizeof(time_buf), "%02d:%02d", now.hour, now.minute);
          it.print(w - 16, 6, id(font_headline), fg, TextAlign::TOP_RIGHT, time_buf);
          it.print(w - 15, 7, id(font_headline), fg, TextAlign::TOP_RIGHT, time_buf);
        } else {
          it.print(w - 16, 6, id(font_headline), fg, TextAlign::TOP_RIGHT, "--:--");
        }

        // 水平分隔线
        it.filled_rectangle(8, 52, w - 16, 2, fg);

        // ============ 左栏：天气 (y=60-140) ============
        it.print(16, 60, id(font_label), fg, TextAlign::TOP_LEFT, "> WEATHER");

        // 天气图标（放大到48x48）
        std::string cond = id(g_weather_condition).c_str();
        if (cond == "Sunny" || cond == "Clear") {
          it.image(60, 82, id(ic_sun), fg, bg);
        } else if (cond == "Clouds") {
          it.image(60, 82, id(ic_cloud), fg, bg);
        } else if (cond == "Rain" || cond == "Drizzle") {
          it.image(60, 82, id(ic_rain), fg, bg);
        } else if (cond == "Snow") {
          it.image(60, 82, id(ic_snow), fg, bg);
        } else if (cond == "Thunderstorm") {
          it.image(60, 82, id(ic_thunder), fg, bg);
        } else if (cond == "Mist" || cond == "Fog") {
          it.image(60, 82, id(ic_fog), fg, bg);
        } else {
          it.image(60, 82, id(ic_sun), fg, bg);
        }

        // 温度（大字）
        char temp_buf[16];
        snprintf(temp_buf, sizeof(temp_buf), "%.0fC", id(g_outdoor_temp));
        it.print(116, 90, id(font_headline), fg, TextAlign::TOP_CENTER, temp_buf);

        // 天气描述
        it.print(100, 124, id(font_label), fg, TextAlign::TOP_CENTER, id(g_weather_desc).c_str());

        // 竖线分隔
        it.filled_rectangle(200, 60, 2, 80, fg);

        // ============ 右栏：传感器 (y=60-140) ============
        it.print(216, 60, id(font_label), fg, TextAlign::TOP_LEFT, "> SENSORS");

        // 室内温度
        it.image(220, 82, id(ic_thermometer), fg, bg);
        char indoor_temp[16];
        if (id(temp_sensor).has_state()) {
          id(g_cached_temp) = id(temp_sensor).state;
          snprintf(indoor_temp, sizeof(indoor_temp), "%.1fC", id(g_cached_temp));
        } else {
          snprintf(indoor_temp, sizeof(indoor_temp), "%.1fC", id(g_cached_temp));
        }
        it.print(280, 86, id(font_body), fg, TextAlign::TOP_LEFT, indoor_temp);

        // 湿度 - 绘制波浪图标
        for (int i = 0; i < 3; i++) {
          int y = 116 + i * 6;
          it.line(220, y, 248, y, fg);
          it.filled_rectangle(226, y - 2, 4, 2, fg);
          it.filled_rectangle(236, y - 2, 4, 2, fg);
        }
        char indoor_hum[16];
        if (id(hum_sensor).has_state()) {
          id(g_cached_hum) = id(hum_sensor).state;
          snprintf(indoor_hum, sizeof(indoor_hum), "%.0f%%", id(g_cached_hum));
        } else {
          snprintf(indoor_hum, sizeof(indoor_hum), "%.0f%%", id(g_cached_hum));
        }
        it.print(280, 114, id(font_body), fg, TextAlign::TOP_LEFT, indoor_hum);

        // 分隔线
        it.filled_rectangle(8, 144, w - 16, 2, fg);

        // ============ 任务区域 (y=150-240) ============
        it.print(16, 150, id(font_label), fg, TextAlign::TOP_LEFT, "> TASKS");

        const char* tasks[3] = {"BUY MILK", "REVIEW PR", "WEEKLY REPORT"};
        uint8_t sel = id(g_todo_idx);
        uint8_t done_mask = id(g_todo_state);

        for (int i = 0; i < 3; i++) {
          bool is_done = (done_mask >> i) & 1;
          char line[48];
          int y = 172 + i * 22;
          if (i == sel) {
            // 选中项：反色背景
            it.filled_rectangle(16, y - 2, w - 32, 20, fg);
            it.print(20, y, id(font_body), bg, TextAlign::TOP_LEFT, ">>");
            snprintf(line, sizeof(line), "%s", tasks[i]);
            if (is_done) {
              // 绘制简单的勾选标记
              it.line(52, y + 6, 58, y + 12, bg);
              it.line(58, y + 12, 70, y, bg);
            }
            it.print(76, y, id(font_body), bg, TextAlign::TOP_LEFT, line);
          } else {
            // 未选中项
            it.print(20, y, id(font_body), fg, TextAlign::TOP_LEFT, " >");
            snprintf(line, sizeof(line), "%s", tasks[i]);
            if (is_done) {
              // 绘制简单的勾选标记
              it.line(52, y + 6, 58, y + 12, fg);
              it.line(58, y + 12, 70, y, fg);
            }
            it.print(76, y, id(font_body), fg, TextAlign::TOP_LEFT, line);
          }
        }

        // ============ 底部状态栏 ============
        it.filled_rectangle(8, 244, w - 16, 2, fg);

        // 电池状态
        it.image(16, 252, id(ic_battery), fg, bg);
        char battery[16];
        if (id(bat_voltage).has_state()) {
          id(g_cached_bat) = id(bat_voltage).state;
          float v = id(g_cached_bat);
          int pct;
          if (v >= 4.2) pct = 100;
          else if (v >= 4.1) pct = 90;
          else if (v >= 4.0) pct = 80;
          else if (v >= 3.9) pct = 70;
          else if (v >= 3.8) pct = 50;
          else if (v >= 3.7) pct = 30;
          else if (v >= 3.6) pct = 15;
          else if (v >= 3.5) pct = 5;
          else pct = 0;
          snprintf(battery, sizeof(battery), "%d%% (%.1fV)", pct, v);
        } else {
          float v = id(g_cached_bat);
          int pct;
          if (v >= 4.2) pct = 100;
          else if (v >= 4.1) pct = 90;
          else if (v >= 4.0) pct = 80;
          else if (v >= 3.9) pct = 70;
          else if (v >= 3.8) pct = 50;
          else if (v >= 3.7) pct = 30;
          else if (v >= 3.6) pct = 15;
          else if (v >= 3.5) pct = 5;
          else pct = 0;
          snprintf(battery, sizeof(battery), "%d%% (%.1fV)", pct, v);
        }
        it.print(44, 254, id(font_footer), fg, TextAlign::TOP_LEFT, battery);

        // WiFi信号
        if (id(wifi_rssi).has_state()) {
          id(g_cached_rssi) = id(wifi_rssi).state;
        }
        // 始终显示WiFi图标和缓存的信号强度
        it.image(84, 254, id(ic_wifi), fg, bg);
        int rssi = id(g_cached_rssi);
        char rssi_str[8];
        if (rssi > -50) {
          snprintf(rssi_str, sizeof(rssi_str), "S");
        } else if (rssi > -70) {
          snprintf(rssi_str, sizeof(rssi_str), "M");
        } else {
          snprintf(rssi_str, sizeof(rssi_str), "W");
        }
        it.print(104, 254, id(font_footer), fg, TextAlign::TOP_LEFT, rssi_str);

        // 日期
        if (now.is_valid()) {
          char date_buf[32];
          snprintf(date_buf, sizeof(date_buf), "%04d.%02d.%02d", now.year, now.month, now.day_of_month);
          it.print(w / 2, 254, id(font_footer), fg, TextAlign::TOP_CENTER, date_buf);
        }

        // 操作提示
        it.print(w - 16, 254, id(font_footer), fg, TextAlign::TOP_RIGHT, "BOOT=MODE KEY=SEL");

      // ============ WORK 模式 ============
      } else {
        // ============ 顶部状态栏 ============
        it.print(16, 6, id(font_headline), fg, TextAlign::TOP_LEFT, "WORK");
        it.print(16, 38, id(font_footer), fg, TextAlign::TOP_LEFT, "// DEVELOPMENT");

        // 水平分隔线
        it.filled_rectangle(8, 52, w - 16, 2, fg);

        // 状态文字（大字加粗）
        const char* status_text = "IDLE";
        if (st == 1) { status_text = "GEN"; }
        if (st == 2) { status_text = "BUILD"; }
        if (st == 3) { status_text = "OK"; }
        if (st == 4) { status_text = "ERR"; }
        it.print(w / 2, 60, id(font_display), fg, TextAlign::TOP_CENTER, status_text);
        it.print(w / 2 + 1, 61, id(font_display), fg, TextAlign::TOP_CENTER, status_text);

        // 耗时
        char dur[48];
        if (st == 1 || st == 2) {
          snprintf(dur, sizeof(dur), "ELAPSED: %ds", (int)id(g_work_duration));
        } else if (st == 3 || st == 4) {
          snprintf(dur, sizeof(dur), "DONE: %ds", (int)id(g_work_duration));
        } else {
          snprintf(dur, sizeof(dur), "READY");
        }
        it.print(w / 2, 112, id(font_body), fg, TextAlign::TOP_CENTER, dur);

        // 分隔线
        it.filled_rectangle(8, 140, w - 16, 2, fg);

        // ============ 进度条区域 ============
        it.print(16, 150, id(font_label), fg, TextAlign::TOP_LEFT, "> PROGRESS");

        // 进度条背景
        int bar_x = 16;
        int bar_y = 172;
        int bar_w = w - 32;
        int bar_h = 24;
        it.filled_rectangle(bar_x, bar_y, bar_w, bar_h, fg);
        it.filled_rectangle(bar_x + 2, bar_y + 2, bar_w - 4, bar_h - 4, bg);

        // 进度填充
        float progress = 0.0f;
        if (st == 2) {
          progress = 0.6f;
        } else if (st == 3 || st == 4) {
          progress = 1.0f;
        }
        if (progress > 0.0f) {
          int fill_w = (int)((bar_w - 8) * progress);
          it.filled_rectangle(bar_x + 4, bar_y + 4, fill_w, bar_h - 8, fg);
        }

        // 百分比
        char pct_buf[16];
        snprintf(pct_buf, sizeof(pct_buf), "%.0f%%", progress * 100.0f);
        it.print(w / 2, bar_y + 6, id(font_body), fg, TextAlign::TOP_CENTER, pct_buf);

        // 分隔线
        it.filled_rectangle(8, 208, w - 16, 2, fg);

        // ============ 项目信息 ============
        it.print(16, 216, id(font_label), fg, TextAlign::TOP_LEFT, "> PROJECT");
        it.print(100, 216, id(font_body), fg, TextAlign::TOP_LEFT, id(g_project).c_str());

        it.print(16, 238, id(font_label), fg, TextAlign::TOP_LEFT, "> BRANCH");
        it.print(100, 238, id(font_body), fg, TextAlign::TOP_LEFT, id(g_branch).c_str());

        // ============ 底部状态栏 ============
        it.filled_rectangle(8, 260, w - 16, 2, fg);
        it.print(w - 16, 266, id(font_footer), fg, TextAlign::TOP_RIGHT, "BOOT=MODE KEY=SEL");
      }

binary_sensor:
  - platform: gpio
    id: btn_boot
    name: "Boot Button"
    pin:
      number: GPIO0
      inverted: true
      mode: INPUT_PULLUP
    on_click:
      - min_length: 50ms
        max_length: 1000ms
        then:
          - lambda: |-
              uint8_t mode = id(g_mode);
              if (mode == 0) {
                uint8_t new_idx = (id(g_todo_idx) + 1) % 3;
                id(g_todo_idx) = new_idx;
              } else {
                uint8_t new_st = (id(g_work_status) + 1) % 5;
                id(g_work_status) = new_st;
                id(g_work_duration) = 0;
              }
          - component.update: my_display
    on_multi_click:
      - timing:
          - ON for at least 1.2s
        then:
          - lambda: |-
              id(g_mode) = !id(g_mode);
              id(g_todo_idx) = 0;
          - component.update: my_display

  - platform: gpio
    id: btn_key
    name: "Key Button"
    pin:
      number: GPIO18
      inverted: true
      mode: INPUT
    on_click:
      - min_length: 50ms
        max_length: 1000ms
        then:
          - lambda: |-
              uint8_t mode = id(g_mode);
              if (mode == 0) {
                uint8_t idx = id(g_todo_idx);
                if (idx < 3) {
                  id(g_todo_state) ^= (1 << idx);
                }
              } else {
                id(g_work_status) = 0;
                id(g_work_duration) = 0;
              }
          - component.update: my_display
    on_multi_click:
      - timing:
          - ON for at least 1.2s
        then:
          - lambda: |-
              uint8_t mode = id(g_mode);
              if (mode == 1) {
                id(g_work_status) = 2;
                id(g_work_duration) = 0;
              }
          - component.update: my_display

interval:
  - interval: 1s
    then:
      - lambda: |-
          uint8_t st = id(g_work_status);
          if (st == 1 || st == 2) {
            id(g_work_duration)++;
          }
