esphome:
  name: rlcd-dualmode
  friendly_name: "RLCD Dual Mode"
  on_boot:
    priority: 600
    then:
      - lambda: id(g_mode) = 0;
      - lambda: id(g_todo_idx) = 0;
      - lambda: id(g_todo_state) = 0;
      - lambda: id(g_work_status) = 0;
      - lambda: id(g_work_duration) = 0;
      - delay: 500ms
      - component.update: my_display

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

logger:
  level: INFO

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "RLCD-Fallback"
    password: "12345678"

captive_portal:

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

spi:
  clk_pin: GPIO11
  mosi_pin: GPIO12

i2c:
  sda: GPIO13
  scl: GPIO14
  scan: true
  id: bus_a

external_components:
  - source:
      type: local
      path: ./ESPHome-ST7305-RLCD/components
    components: [ st7305_rlcd ]
    refresh: 0s

time:
  - platform: sntp
    id: my_time
    timezone: "Asia/Shanghai"
  - platform: pcf85063
    id: pcf_time
    update_interval: 60s

sensor:
  - platform: shtcx
    address: 0x70
    update_interval: 60s
    i2c_id: bus_a
    temperature:
      name: "Temperature"
      id: temp_sensor
    humidity:
      name: "Humidity"
      id: hum_sensor

  - platform: adc
    id: bat_voltage
    name: "Battery Voltage"
    pin: GPIO4
    attenuation: 12db
    update_interval: 60s
    filters:
      - multiply: 3.0

globals:
  - id: g_mode
    type: uint8_t
    initial_value: "0"

  - id: g_work_status
    type: uint8_t
    initial_value: "0"

  - id: g_work_duration
    type: uint16_t
    initial_value: "0"

  - id: g_project
    type: std::string
    initial_value: "\"rlcd-project\""

  - id: g_branch
    type: std::string
    initial_value: "\"main\""

  - id: g_todo_idx
    type: uint8_t
    initial_value: "0"

  - id: g_todo_state
    type: uint8_t
    initial_value: "0"

font:
  - file: "gfonts://Roboto"
    id: font_caption
    size: 12
    bpp: 1

  - file: "gfonts://Roboto"
    id: font_body
    size: 18
    bpp: 1

  - file: "gfonts://Roboto"
    id: font_headline
    size: 22
    bpp: 1

  - file: "gfonts://Roboto Mono"
    id: font_display
    size: 52
    bpp: 1

display:
  - platform: st7305_rlcd
    model: WAVESHARE_400X300
    id: my_display
    cs_pin: GPIO40
    dc_pin: GPIO5
    reset_pin: GPIO41
    data_rate: 1MHz
    update_interval: 5s
    lambda: |-
      uint8_t mode = id(g_mode);
      uint8_t st = id(g_work_status);
      int w = 400;
      int h = 300;

      auto bg = (mode == 1) ? COLOR_OFF : COLOR_ON;
      auto fg = (mode == 1) ? COLOR_ON : COLOR_OFF;

      // 白底黑字 - 反射屏最佳对比度
      bg = COLOR_OFF;
      fg = COLOR_ON;

      // 清屏
      it.fill(bg);

      // ============ LIFE 模式 ============
      if (mode == 0) {
        auto now = id(my_time).now();

        // --- 顶部状态栏 y:0-22 ---
        it.print(16, 6, id(font_caption), fg, TextAlign::TOP_LEFT, "LIFE");
        // 电池 (百分比 + 电压)
        char bat_top[32];
        if (id(bat_voltage).has_state()) {
          float v = id(bat_voltage).state;
          // 3.0V=0% ~ 4.2V=100%
          int pct = (int)((v - 3.0f) * 100.0f / 1.2f);
          if (pct < 0) pct = 0;
          if (pct > 100) pct = 100;
          snprintf(bat_top, sizeof(bat_top), "BAT %d%%  %.2fV", pct, v);
        } else {
          snprintf(bat_top, sizeof(bat_top), "BAT --%%  --.--V");
        }
        it.print(w - 16, 6, id(font_caption), fg, TextAlign::TOP_RIGHT, bat_top);
        // 分隔线
        it.line(16, 22, w - 16, 22, fg);

        // --- 时间 y:30-100 ---
        if (now.is_valid()) {
          char time_buf[16];
          snprintf(time_buf, sizeof(time_buf), "%02d:%02d", now.hour, now.minute);
          it.print(w / 2, 32, id(font_display), fg, TextAlign::TOP_CENTER, time_buf);
        } else {
          it.print(w / 2, 32, id(font_display), fg, TextAlign::TOP_CENTER, "--:--");
        }

        // --- 日期 y:96-118 ---
        if (now.is_valid()) {
          char date_buf[32];
          // day_of_week: 1=Sun, 2=Mon, ... 7=Sat
          const char* wd[] = {"Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"};
          int wd_idx = now.day_of_week - 1;
          if (wd_idx < 0) wd_idx = 0;
          if (wd_idx > 6) wd_idx = 6;
          snprintf(date_buf, sizeof(date_buf), "%04d-%02d-%02d  %s",
                   now.year, now.month, now.day_of_month, wd[wd_idx]);
          it.print(w / 2, 96, id(font_body), fg, TextAlign::TOP_CENTER, date_buf);
        } else {
          it.print(w / 2, 96, id(font_body), fg, TextAlign::TOP_CENTER, "syncing time...");
        }

        // --- 环境信息 y:122-146 ---
        char env_buf[48];
        if (id(temp_sensor).has_state() && id(hum_sensor).has_state()) {
          snprintf(env_buf, sizeof(env_buf), "%.1f C    %.0f %%", id(temp_sensor).state, id(hum_sensor).state);
        } else {
          snprintf(env_buf, sizeof(env_buf), "--.- C    -- %%");
        }
        it.print(w / 2, 126, id(font_body), fg, TextAlign::TOP_CENTER, env_buf);

        // 分隔线
        it.line(16, 152, w - 16, 152, fg);

        // --- 待办列表 y:156-232 ---
        it.print(16, 158, id(font_caption), fg, TextAlign::TOP_LEFT, "TASKS");

        const char* tasks[3] = {"Buy milk", "Review PR", "Submit weekly report"};
        int task_y = 178;
        uint8_t sel = id(g_todo_idx);
        uint8_t done_mask = id(g_todo_state);

        for (int i = 0; i < 3; i++) {
          bool is_done = (done_mask >> i) & 1;
          char line[48];

          if (i == sel) {
            // 选中项 - 反白背景，保持完成状态
            it.filled_rectangle(16, task_y - 2, w - 32, 18, fg);
            snprintf(line, sizeof(line), "[%c] %s", is_done ? 'X' : ' ', tasks[i]);
            it.print(24, task_y, id(font_body), bg, TextAlign::TOP_LEFT, line);
          } else {
            // 非选中项
            snprintf(line, sizeof(line), "[%c] %s", is_done ? 'X' : ' ', tasks[i]);
            it.print(24, task_y, id(font_body), fg, TextAlign::TOP_LEFT, line);
          }
          task_y += 20;
        }

        // --- 底部状态栏 y:245-300 ---
        it.line(16, 248, w - 16, 248, fg);

        // 第一行: 左下状态, 右下按键说明
        it.print(16, 262, id(font_caption), fg, TextAlign::TOP_LEFT,
                 id(temp_sensor).has_state() ? "SENSOR OK" : "SENSOR --");
        it.print(w - 16, 262, id(font_caption), fg, TextAlign::TOP_RIGHT,
                 "BOOT: Mode    KEY: Select");

        // 第二行: 右下长按提示
        it.print(w - 16, 282, id(font_caption), fg, TextAlign::TOP_RIGHT,
                 "Long BOOT > WORK mode");

      // ============ WORK 模式 ============
      } else {
        // --- 顶部状态栏 ---
        it.print(16, 6, id(font_caption), fg, TextAlign::TOP_LEFT, ">> CODE <<");

        char bat_top[32];
        if (id(bat_voltage).has_state()) {
          float v = id(bat_voltage).state;
          int pct = (int)((v - 3.0f) * 100.0f / 1.2f);
          if (pct < 0) pct = 0;
          if (pct > 100) pct = 100;
          snprintf(bat_top, sizeof(bat_top), "BAT %d%%  %.2fV", pct, v);
        } else {
          snprintf(bat_top, sizeof(bat_top), "BAT --%%  --.--V");
        }
        it.print(w - 16, 6, id(font_caption), fg, TextAlign::TOP_RIGHT, bat_top);
        it.line(16, 22, w - 16, 22, fg);

        // --- 状态大字 y:30-90 ---
        const char* status_text = "IDLE";
        if (st == 1) status_text = "GENERATE";
        if (st == 2) status_text = "BUILDING";
        if (st == 3) status_text = "SUCCESS";
        if (st == 4) status_text = "FAILED";
        it.print(w / 2, 30, id(font_display), fg, TextAlign::TOP_CENTER, status_text);

        // --- 计时/描述 y:95-120 ---
        char dur[48];
        if (st == 1 || st == 2) {
          snprintf(dur, sizeof(dur), "elapsed %ds", (int)id(g_work_duration));
        } else if (st == 3 || st == 4) {
          snprintf(dur, sizeof(dur), "finished in %ds", (int)id(g_work_duration));
        } else {
          snprintf(dur, sizeof(dur), "ready");
        }
        it.print(w / 2, 98, id(font_body), fg, TextAlign::TOP_CENTER, dur);

        // --- 进度条 (BUILD/GENERATE 时显示) y:125-145 ---
        if (st == 1 || st == 2) {
          int bar_x = 60;
          int bar_w = w - 120;
          int bar_y = 128;
          int bar_h = 12;

          // 外框
          it.rectangle(bar_x, bar_y, bar_w, bar_h, fg);

          // 填充进度 (模拟根据时间递增)
          int progress = (id(g_work_duration) * 5) % 100;
          if (progress < 5) progress = 5;
          if (progress > 95) progress = 95;
          int fill_w = (bar_w - 4) * progress / 100;
          it.filled_rectangle(bar_x + 2, bar_y + 2, fill_w, bar_h - 4, fg);

          // 百分比
          char pct[8];
          snprintf(pct, sizeof(pct), "%d%%", progress);
          it.print(w / 2, bar_y + bar_h + 2, id(font_caption), fg, TextAlign::TOP_CENTER, pct);
        } else if (st == 3) {
          // SUCCESS - 显示对勾
          it.print(w / 2, 130, id(font_display), fg, TextAlign::TOP_CENTER, "OK");
        } else if (st == 4) {
          // FAILED - 显示X
          it.print(w / 2, 130, id(font_display), fg, TextAlign::TOP_CENTER, "!!");
        }

        // 分隔线
        it.line(16, 160, w - 16, 160, fg);

        // --- 项目信息 y:165-200 ---
        char proj[64];
        snprintf(proj, sizeof(proj), "%s", id(g_project).c_str());
        it.print(w / 2, 166, id(font_body), fg, TextAlign::TOP_CENTER, proj);

        char branch[32];
        snprintf(branch, sizeof(branch), "[%s]", id(g_branch).c_str());
        it.print(w / 2, 186, id(font_caption), fg, TextAlign::TOP_CENTER, branch);

        // --- 状态机提示 y:205-235 ---
        it.line(16, 210, w - 16, 210, fg);
        if (st == 0) {
          it.print(w / 2, 216, id(font_body), fg, TextAlign::TOP_CENTER, "KEY long > START build");
        } else if (st == 3) {
          it.print(w / 2, 216, id(font_body), fg, TextAlign::TOP_CENTER, "KEY > Continue");
        } else if (st == 4) {
          it.print(w / 2, 216, id(font_body), fg, TextAlign::TOP_CENTER, "KEY > Retry");
        } else {
          it.print(w / 2, 216, id(font_body), fg, TextAlign::TOP_CENTER, "KEY > Cancel");
        }

        // --- 底部状态栏 y:245-300 ---
        it.line(16, 248, w - 16, 248, fg);
        it.print(16, 262, id(font_caption), fg, TextAlign::TOP_LEFT, "SENSOR OK");
        it.print(w - 16, 262, id(font_caption), fg, TextAlign::TOP_RIGHT,
                 "BOOT: Mode    KEY: Action");
        it.print(w - 16, 282, id(font_caption), fg, TextAlign::TOP_RIGHT,
                 "Long BOOT > LIFE mode");
      }

binary_sensor:
  - platform: gpio
    id: btn_boot
    name: "Boot Button"
    pin:
      number: GPIO0
      inverted: true
      mode: INPUT_PULLUP
    on_click:
      - min_length: 50ms
        max_length: 1000ms
        then:
          - lambda: |-
              uint8_t mode = id(g_mode);
              if (mode == 0) {
                id(g_todo_idx) = (id(g_todo_idx) + 1) % 3;
              } else {
                id(g_work_status) = (id(g_work_status) + 1) % 5;
                id(g_work_duration) = 0;
              }
          - component.update: my_display
    on_multi_click:
      - timing:
          - ON for at least 1.2s
        then:
          - lambda: |-
              id(g_mode) = !id(g_mode);
              id(g_todo_idx) = 0;
          - component.update: my_display

  - platform: gpio
    id: btn_key
    name: "Key Button"
    pin:
      number: GPIO18
      inverted: true
      mode: INPUT
    on_click:
      - min_length: 50ms
        max_length: 1000ms
        then:
          - lambda: |-
              uint8_t mode = id(g_mode);
              if (mode == 0) {
                uint8_t idx = id(g_todo_idx);
                id(g_todo_state) ^= (1 << idx);
              } else {
                id(g_work_status) = 0;
                id(g_work_duration) = 0;
              }
          - component.update: my_display
    on_multi_click:
      - timing:
          - ON for at least 1.2s
        then:
          - lambda: |-
              uint8_t mode = id(g_mode);
              if (mode == 1) {
                id(g_work_status) = 2;
                id(g_work_duration) = 0;
              }
          - component.update: my_display

interval:
  - interval: 1s
    then:
      - lambda: |-
          uint8_t st = id(g_work_status);
          if (st == 1 || st == 2) {
            id(g_work_duration)++;
          }
