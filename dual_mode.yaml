esphome:
  name: rlcd-dualmode
  friendly_name: "RLCD Dual Mode"
  on_boot:
    priority: 600
    then:
      - lambda: id(g_mode) = 0;
      - lambda: id(g_todo_idx) = 0;
      - lambda: id(g_todo_state) = 0;
      - lambda: id(g_work_status) = 0;
      - lambda: id(g_work_duration) = 0;
      - delay: 500ms
      - component.update: my_display

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

logger:
  level: INFO

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "RLCD-Fallback"
    password: "12345678"

captive_portal:

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

spi:
  clk_pin: GPIO11
  mosi_pin: GPIO12

i2c:
  sda: GPIO13
  scl: GPIO14
  scan: true
  id: bus_a

external_components:
  - source:
      type: local
      path: ./ESPHome-ST7305-RLCD/components
    components: [ st7305_rlcd ]
    refresh: 0s

time:
  - platform: pcf85063
    id: my_time
    update_interval: 60s

sensor:
  - platform: shtcx
    address: 0x70
    update_interval: 60s
    i2c_id: bus_a
    temperature:
      name: "Temperature"
      id: temp_sensor
    humidity:
      name: "Humidity"
      id: hum_sensor

  - platform: adc
    id: bat_voltage
    name: "Battery Voltage"
    pin: GPIO4
    attenuation: 12db
    update_interval: 60s
    filters:
      - multiply: 3.0

globals:
  - id: g_mode
    type: uint8_t
    initial_value: "0"

  - id: g_work_status
    type: uint8_t
    initial_value: "0"

  - id: g_work_duration
    type: uint16_t
    initial_value: "0"

  - id: g_project
    type: std::string
    initial_value: "\"rlcd-project\""

  - id: g_branch
    type: std::string
    initial_value: "\"main\""

  - id: g_todo_idx
    type: uint8_t
    initial_value: "0"

  - id: g_todo_state
    type: uint8_t
    initial_value: "0"

font:
  - file: "gfonts://Roboto"
    id: font_caption
    size: 12
    bpp: 1

  - file: "gfonts://Roboto"
    id: font_body
    size: 18
    bpp: 1

  - file: "gfonts://Roboto"
    id: font_headline
    size: 22
    bpp: 1

  - file: "gfonts://Roboto Mono"
    id: font_display
    size: 52
    bpp: 1

display:
  - platform: st7305_rlcd
    model: WAVESHARE_400X300
    id: my_display
    cs_pin: GPIO40
    dc_pin: GPIO5
    reset_pin: GPIO41
    data_rate: 1MHz
    update_interval: 5s
    lambda: |-
      uint8_t mode = id(g_mode);
      uint8_t st = id(g_work_status);
      int w = it.get_width();
      int h = it.get_height();

      auto bg = (mode == 1) ? COLOR_ON : COLOR_OFF;
      auto fg = (mode == 1) ? COLOR_OFF : COLOR_ON;

      // Clear screen
      it.fill(bg);

      if (mode == 0) {
        auto now = id(my_time).now();

        // Top status bar
        it.print(12, 4, id(font_caption), fg, TextAlign::TOP_LEFT, "LIFE");
        it.print(w - 12, 4, id(font_caption), fg, TextAlign::TOP_RIGHT, "[W]");
        it.line(12, 22, w - 12, 22, fg);

        // Time
        if (now.is_valid()) {
          char buf[16];
          snprintf(buf, sizeof(buf), "%02d:%02d", now.hour, now.minute);
          it.print(w / 2, 32, id(font_display), fg, TextAlign::CENTER, buf);

          char date_buf[32];
          const char* wd[] = {"Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"};
          snprintf(date_buf, sizeof(date_buf), "%02d/%02d %s", now.month, now.day_of_month, wd[now.day_of_week]);
          it.print(w / 2, 68, id(font_body), fg, TextAlign::CENTER, date_buf);
        } else {
          it.print(w / 2, 32, id(font_display), fg, TextAlign::CENTER, "--:--");
          it.print(w / 2, 68, id(font_body), fg, TextAlign::CENTER, "syncing...");
        }

        // Env info
        char env[48];
        if (id(temp_sensor).has_state() && id(hum_sensor).has_state()) {
          snprintf(env, sizeof(env), "%.1fC | %.0f%%", id(temp_sensor).state, id(hum_sensor).state);
        } else {
          snprintf(env, sizeof(env), "--.-C | --%%");
        }
        it.print(w / 2, 96, id(font_body), fg, TextAlign::CENTER, env);

        // Divider
        it.line(12, 122, w - 12, 122, fg);

        // TODO list
        it.print(12, 128, id(font_caption), fg, TextAlign::TOP_LEFT, "TODO");

        const char* todos[3] = {"Buy milk", "Review PR", "Submit weekly"};
        int todo_y = 148;
        uint8_t sel = id(g_todo_idx);
        uint8_t done_mask = id(g_todo_state);

        for (int i = 0; i < 3; i++) {
          bool is_done = (done_mask >> i) & 1;
          char line[48];
          snprintf(line, sizeof(line), "%c %s", is_done ? 'x' : 'o', todos[i]);

          if (i == sel) {
            it.filled_rectangle(16, todo_y - 2, w - 32, 20, fg);
            it.print(24, todo_y, id(font_body), bg, TextAlign::TOP_LEFT, line);
          } else {
            it.print(24, todo_y, id(font_body), fg, TextAlign::TOP_LEFT, line);
          }
          todo_y += 22;
        }

        // Bottom status bar
        it.line(12, 220, w - 12, 220, fg);

        // Battery
        char bat[20];
        if (id(bat_voltage).has_state()) {
          float v = id(bat_voltage).state;
          int bars = (v > 4.0) ? 4 : (v > 3.7) ? 3 : (v > 3.4) ? 2 : 1;
          char bar_str[5];
          for (int i = 0; i < 4; i++) bar_str[i] = (i < bars) ? '|' : ' ';
          bar_str[4] = '\0';
          snprintf(bat, sizeof(bat), "[%s] %.2fV", bar_str, v);
        } else {
          snprintf(bat, sizeof(bat), "[----] --.--V");
        }
        it.print(12, 226, id(font_caption), fg, TextAlign::TOP_LEFT, bat);

        // Hints
        it.print(w - 12, 226, id(font_caption), fg, TextAlign::TOP_RIGHT, "B=Nxt K=Done");

        // Mode hint (bottom)
        it.print(w / 2, 258, id(font_body), fg, TextAlign::CENTER, "BOOT long=WORK mode");
      } else {
        // WORK MODE
        it.print(12, 4, id(font_caption), fg, TextAlign::TOP_LEFT, "WORK");
        it.print(w - 12, 4, id(font_caption), fg, TextAlign::TOP_RIGHT, "[v]");
        it.line(12, 22, w - 12, 22, fg);

        const char* status_text = "IDLE";
        if (st == 1) status_text = "GENERATE";
        if (st == 2) status_text = "BUILD";
        if (st == 3) status_text = "SUCCESS";
        if (st == 4) status_text = "FAILED";

        it.print(w / 2, 40, id(font_display), fg, TextAlign::CENTER, status_text);

        char dur[48];
        if (st == 1 || st == 2) {
          snprintf(dur, sizeof(dur), "elapsed: %ds", (int)id(g_work_duration));
        } else if (st == 3 || st == 4) {
          snprintf(dur, sizeof(dur), "completed in %ds", (int)id(g_work_duration));
        } else {
          snprintf(dur, sizeof(dur), "ready to build");
        }
        it.print(w / 2, 100, id(font_headline), fg, TextAlign::CENTER, dur);

        it.line(80, 128, w - 80, 128, fg);

        char proj[64];
        snprintf(proj, sizeof(proj), "%s", id(g_project).c_str());
        it.print(w / 2, 140, id(font_body), fg, TextAlign::CENTER, proj);

        char branch[32];
        snprintf(branch, sizeof(branch), "branch: %s", id(g_branch).c_str());
        it.print(w / 2, 162, id(font_caption), fg, TextAlign::CENTER, branch);

        it.line(12, 188, w - 12, 188, fg);

        if (st == 0) {
          it.print(w / 2, 208, id(font_body), fg, TextAlign::CENTER, "K long = Start Build");
        } else if (st == 4) {
          it.print(w / 2, 208, id(font_body), fg, TextAlign::CENTER, "K = Acknowledge");
        } else {
          it.print(w / 2, 208, id(font_body), fg, TextAlign::CENTER, "K = Cancel");
        }

        it.line(12, 240, w - 12, 240, fg);

        char bat[20];
        if (id(bat_voltage).has_state()) {
          snprintf(bat, sizeof(bat), "%.2fV", id(bat_voltage).state);
        } else {
          snprintf(bat, sizeof(bat), "--.--V");
        }
        it.print(12, 246, id(font_caption), fg, TextAlign::TOP_LEFT, bat);

        it.print(w - 12, 246, id(font_caption), fg, TextAlign::TOP_RIGHT, "BOOT=LIFE mode");
      }

binary_sensor:
  - platform: gpio
    id: btn_boot
    name: "Boot Button"
    pin:
      number: GPIO0
      inverted: true
      mode: INPUT_PULLUP
    on_click:
      - min_length: 50ms
        max_length: 1000ms
        then:
          - lambda: |-
              uint8_t mode = id(g_mode);
              if (mode == 0) {
                id(g_todo_idx) = (id(g_todo_idx) + 1) % 3;
              } else {
                id(g_work_status) = (id(g_work_status) + 1) % 5;
                id(g_work_duration) = 0;
              }
          - component.update: my_display
    on_multi_click:
      - timing:
          - ON for at least 1.2s
        then:
          - lambda: |-
              id(g_mode) = !id(g_mode);
              id(g_todo_idx) = 0;
          - component.update: my_display

  - platform: gpio
    id: btn_key
    name: "Key Button"
    pin:
      number: GPIO18
      inverted: true
      mode: INPUT
    on_click:
      - min_length: 50ms
        max_length: 1000ms
        then:
          - lambda: |-
              uint8_t mode = id(g_mode);
              if (mode == 0) {
                uint8_t idx = id(g_todo_idx);
                id(g_todo_state) ^= (1 << idx);
              } else {
                id(g_work_status) = 0;
                id(g_work_duration) = 0;
              }
          - component.update: my_display
    on_multi_click:
      - timing:
          - ON for at least 1.2s
        then:
          - lambda: |-
              uint8_t mode = id(g_mode);
              if (mode == 1) {
                id(g_work_status) = 2;
                id(g_work_duration) = 0;
              }
          - component.update: my_display

interval:
  - interval: 1s
    then:
      - lambda: |-
          uint8_t st = id(g_work_status);
          if (st == 1 || st == 2) {
            id(g_work_duration)++;
          }
