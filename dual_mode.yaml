esphome:
  name: rlcd-dualmode
  friendly_name: "RLCD Dual Mode"
  on_boot:
    priority: 600
    then:
      - lambda: id(g_mode) = 0;
      - lambda: id(g_todo_idx) = 0;
      - lambda: id(g_todo_state) = 0;
      - lambda: id(g_work_status) = 0;
      - lambda: id(g_work_duration) = 0;
      - delay: 500ms
      - component.update: my_display
      - delay: 15s
      - script.execute: fetch_weather_script

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

logger:
  level: INFO

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "RLCD-Fallback"
    password: "12345678"

captive_portal:

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

spi:
  clk_pin: GPIO11
  mosi_pin: GPIO12

i2c:
  sda: GPIO13
  scl: GPIO14
  scan: true
  id: bus_a

external_components:
  - source:
      type: local
      path: ./ESPHome-ST7305-RLCD/components
    components: [ st7305_rlcd ]
    refresh: 0s

http_request:
  id: http_client
  useragent: "esphome/rlcd"
  verify_ssl: false

time:
  - platform: sntp
    id: my_time
    timezone: "Asia/Shanghai"
    on_time:
      - minutes: 0
        hours: '*'
        then:
          - script.execute: fetch_weather_script
      - seconds: 0
        then:
          - component.update: my_display
  - platform: pcf85063
    id: pcf_time
    update_interval: 60s

script:
  - id: fetch_weather_script
    mode: restart
    then:
      - http_request.get:
          url: "https://api.openweathermap.org/data/2.5/weather?id=7843638&appid=af8978b4b02a74678d7249baf9b7c0aa&units=metric"
          capture_response: true
          on_response:
            then:
              - lambda: |-
                  ESP_LOGD("weather", "Response: %s", body.c_str());
                  auto doc = json::parse_json(body);
                  if (!doc.isNull()) {
                    float temp_val = doc["main"]["temp"];
                    int hum_val = doc["main"]["humidity"];
                    id(g_outdoor_temp) = temp_val;
                    id(g_outdoor_hum) = (float)hum_val;
                    std::string cond = doc["weather"][0]["main"];
                    std::string desc = doc["weather"][0]["description"];
                    id(g_weather_condition) = cond;
                    id(g_weather_desc) = desc;
                    ESP_LOGD("weather", "T=%.1f H=%d %s/%s", temp_val, hum_val, cond.c_str(), desc.c_str());
                  }

sensor:
  - platform: shtcx
    address: 0x70
    update_interval: 60s
    i2c_id: bus_a
    temperature:
      name: "Temperature"
      id: temp_sensor
    humidity:
      name: "Humidity"
      id: hum_sensor

  - platform: adc
    id: bat_voltage
    name: "Battery Voltage"
    pin: GPIO4
    attenuation: 12db
    update_interval: 60s
    filters:
      - multiply: 3.0

  - platform: wifi_signal
    id: wifi_rssi
    name: "WiFi Signal"
    update_interval: 30s

globals:
  - id: g_mode
    type: uint8_t
    initial_value: "0"

  - id: g_work_status
    type: uint8_t
    initial_value: "0"

  - id: g_work_duration
    type: uint16_t
    initial_value: "0"

  - id: g_project
    type: std::string
    initial_value: "\"rlcd-project\""

  - id: g_todo_idx
    type: uint8_t
    initial_value: "0"

  - id: g_todo_state
    type: uint8_t
    initial_value: "0"

  - id: g_outdoor_temp
    type: float
    initial_value: "25.0"

  - id: g_outdoor_hum
    type: float
    initial_value: "50.0"

  - id: g_weather_condition
    type: std::string
    initial_value: "\"Sunny\""

  - id: g_weather_desc
    type: std::string
    initial_value: "\"Clear sky\""

  - id: g_branch
    type: std::string
    initial_value: "\"main\""

font:
  - file: "gfonts://VT323"
    id: font_display
    size: 40
    bpp: 1

  - file: "gfonts://VT323"
    id: font_body
    size: 24
    bpp: 1

  - file: "gfonts://VT323"
    id: font_label
    size: 18
    bpp: 1

  - file: "gfonts://VT323"
    id: font_footer
    size: 12
    bpp: 1

image:
  - id: ic_sun
    file: "icons/weather-sunny.svg"
    resize: 36x36
    type: BINARY
  - id: ic_cloud
    file: "icons/cloud.svg"
    resize: 36x36
    type: BINARY
  - id: ic_rain
    file: "icons/weather-rainy.svg"
    resize: 36x36
    type: BINARY
  - id: ic_snow
    file: "icons/weather-snowy.svg"
    resize: 36x36
    type: BINARY
  - id: ic_thunder
    file: "icons/weather-lightning.svg"
    resize: 36x36
    type: BINARY
  - id: ic_fog
    file: "icons/weather-fog.svg"
    resize: 36x36
    type: BINARY
  - id: ic_cloud_sun
    file: "icons/weather-partly-cloudy.svg"
    resize: 36x36
    type: BINARY
  - id: ic_night
    file: "icons/weather-night.svg"
    resize: 36x36
    type: BINARY
  - id: ic_cloudy
    file: "icons/weather-cloudy.svg"
    resize: 36x36
    type: BINARY
  - id: ic_thermometer
    file: "icons/thermometer.svg"
    resize: 24x24
    type: BINARY
  - id: ic_humidity
    file: "icons/droplets.svg"
    resize: 24x24
    type: BINARY
  - id: ic_battery
    file: "icons/battery.svg"
    resize: 24x24
    type: BINARY
  - id: ic_battery_charging
    file: "icons/battery-charging.svg"
    resize: 24x24
    type: BINARY
  - id: ic_check
    file: "icons/check-circle.svg"
    resize: 20x20
    type: BINARY

display:
  - platform: st7305_rlcd
    model: WAVESHARE_400X300
    id: my_display
    cs_pin: GPIO40
    dc_pin: GPIO5
    reset_pin: GPIO41
    data_rate: 1MHz
    update_interval: never
    lambda: |-
      uint8_t mode = id(g_mode);
      uint8_t st = id(g_work_status);
      int w = 400;
      int h = 300;

      auto bg = COLOR_ON;
      auto fg = COLOR_OFF;

      it.fill(bg);

      // === 4px 外边框 ===
      it.filled_rectangle(0, 0, w, 4, fg);
      it.filled_rectangle(0, h - 4, w, 4, fg);
      it.filled_rectangle(0, 0, 4, h, fg);
      it.filled_rectangle(w - 4, 0, 4, h, fg);

      // 角线
      it.line(4, 4, 8, 8, fg);
      it.line(w - 4, 4, w - 8, 8, fg);
      it.line(4, h - 4, 8, h - 8, fg);
      it.line(w - 4, h - 4, w - 8, h - 8, fg);

      // ============ LIFE 模式 ============
      if (mode == 0) {
        auto now = id(my_time).now();

        // 顶部
        it.print(w - 12, 6, id(font_label), fg, TextAlign::TOP_RIGHT, "W:ON B:ON");
        it.filled_rectangle(w - 48, 28, 36, 2, fg);

        // 左栏时间（加粗）
        if (now.is_valid()) {
          char time_buf[16];
          snprintf(time_buf, sizeof(time_buf), "%02d:%02d", now.hour, now.minute);
          it.print(100, 36, id(font_display), fg, TextAlign::TOP_CENTER, time_buf);
          it.print(101, 37, id(font_display), fg, TextAlign::TOP_CENTER, time_buf);
        } else {
          it.print(100, 36, id(font_display), fg, TextAlign::TOP_CENTER, "--:--");
          it.print(101, 37, id(font_display), fg, TextAlign::TOP_CENTER, "--:--");
        }

        // 日期（不加粗）
        if (now.is_valid()) {
          char date_buf[32];
          const char* wd[] = {"SUN", "MON", "TUE", "WED", "THU", "FRI", "SAT"};
          int wd_idx = now.day_of_week - 1;
          if (wd_idx < 0) wd_idx = 0;
          if (wd_idx > 6) wd_idx = 6;
          snprintf(date_buf, sizeof(date_buf), "%04d.%02d.%02d [%s]",
                   now.year, now.month, now.day_of_month, wd[wd_idx]);
          it.print(100, 76, id(font_label), fg, TextAlign::TOP_CENTER, date_buf);
        } else {
          it.print(100, 76, id(font_label), fg, TextAlign::TOP_CENTER, "SYNCING...");
        }

        // 50% 竖线
        it.filled_rectangle(200, 32, 2, 70, fg);

        // 右栏天气 - 使用MDI图标（反色显示）
        std::string cond = id(g_weather_condition).c_str();
        if (cond == "Sunny" || cond == "Clear") {
          it.image(282, 32, id(ic_sun), fg, bg);
        } else if (cond == "Clouds") {
          it.image(282, 32, id(ic_cloud), fg, bg);
        } else if (cond == "Rain" || cond == "Drizzle") {
          it.image(282, 32, id(ic_rain), fg, bg);
        } else if (cond == "Snow") {
          it.image(282, 32, id(ic_snow), fg, bg);
        } else if (cond == "Thunderstorm") {
          it.image(282, 32, id(ic_thunder), fg, bg);
        } else if (cond == "Mist" || cond == "Fog") {
          it.image(282, 32, id(ic_fog), fg, bg);
        } else if (cond == "Partly cloudy") {
          it.image(282, 32, id(ic_cloud_sun), fg, bg);
        } else {
          it.image(282, 32, id(ic_sun), fg, bg);
        }
        char weather_text[48];
        snprintf(weather_text, sizeof(weather_text), "%.0fC %s", id(g_outdoor_temp), id(g_weather_desc).c_str());
        // 天气信息（不加粗）
        it.print(300, 78, id(font_label), fg, TextAlign::TOP_CENTER, weather_text);

        // 分隔线
        it.filled_rectangle(8, 108, w - 16, 2, fg);

        // 三列数据
        int col_width = (w - 32) / 3;

        // 室内温度 - 使用图标替代标题（不加粗）
        it.image(16 + col_width / 2 - 12, 114, id(ic_thermometer), fg, bg);
        char indoor_temp[16];
        if (id(temp_sensor).has_state()) {
          snprintf(indoor_temp, sizeof(indoor_temp), "%.1fC", id(temp_sensor).state);
        } else {
          snprintf(indoor_temp, sizeof(indoor_temp), "--");
        }
        it.print(16 + col_width / 2, 140, id(font_body), fg, TextAlign::TOP_CENTER, indoor_temp);

        // 湿度 - 使用图标替代标题（不加粗）
        it.image(16 + col_width + col_width / 2 - 12, 114, id(ic_humidity), fg, bg);
        char indoor_hum[16];
        if (id(hum_sensor).has_state()) {
          snprintf(indoor_hum, sizeof(indoor_hum), "%.0f%%", id(hum_sensor).state);
        } else {
          snprintf(indoor_hum, sizeof(indoor_hum), "--");
        }
        it.print(16 + col_width + col_width / 2, 140, id(font_body), fg, TextAlign::TOP_CENTER, indoor_hum);

        // 电池 - 使用图标替代标题（不加粗）
        it.image(16 + col_width * 2 + col_width / 2 - 12, 114, id(ic_battery), fg, bg);
        char battery[16];
        if (id(bat_voltage).has_state()) {
          int pct = (int)((id(bat_voltage).state - 3.0f) * 100.0f / 1.2f);
          if (pct < 0) pct = 0;
          if (pct > 100) pct = 100;
          snprintf(battery, sizeof(battery), "%d%%", pct);
        } else {
          snprintf(battery, sizeof(battery), "--");
        }
        it.print(16 + col_width * 2 + col_width / 2, 140, id(font_body), fg, TextAlign::TOP_CENTER, battery);

        // 分隔线
        it.filled_rectangle(8, 164, w - 16, 2, fg);

        // 任务
        it.print(16, 168, id(font_label), fg, TextAlign::TOP_LEFT, "[TASKS]");
        it.print(17, 169, id(font_label), fg, TextAlign::TOP_LEFT, "[TASKS]");
        const char* tasks[3] = {"BUY MILK", "REVIEW PR", "WEEKLY REPORT"};
        uint8_t sel = id(g_todo_idx);
        uint8_t done_mask = id(g_todo_state);

        for (int i = 0; i < 3; i++) {
          bool is_done = (done_mask >> i) & 1;
          char line[48];
          int y = 196 + i * 21;
          if (i == sel) {
            it.filled_rectangle(16, y - 2, w - 32, 18, fg);
            snprintf(line, sizeof(line), "%s", tasks[i]);
            // 只有已完成的项才显示勾选图标
            if (is_done) {
              it.image(20, y - 2, id(ic_check), bg, fg);
            }
            it.print(48, y, id(font_label), bg, TextAlign::TOP_LEFT, line);
          } else {
            snprintf(line, sizeof(line), "%s", tasks[i]);
            if (is_done) {
              it.image(20, y - 2, id(ic_check), fg, bg);
            }
            it.print(48, y, id(font_label), fg, TextAlign::TOP_LEFT, line);
          }
        }

        // 底部
        it.filled_rectangle(8, 274, w - 16, 2, fg);
        it.print(w / 2, 282, id(font_footer), fg, TextAlign::TOP_CENTER, "BOOT=MODE KEY=SELECT");
        it.print(w / 2 + 1, 283, id(font_footer), fg, TextAlign::TOP_CENTER, "BOOT=MODE KEY=SELECT");

      // ============ WORK 模式 ============
      } else {
        // WORK 标题（加粗）
        it.print(12, 6, id(font_display), fg, TextAlign::TOP_LEFT, "WORK");
        it.print(13, 7, id(font_display), fg, TextAlign::TOP_LEFT, "WORK");
        char bat_top[32];
        if (id(bat_voltage).has_state()) {
          int pct = (int)((id(bat_voltage).state - 3.0f) * 100.0f / 1.2f);
          if (pct < 0) pct = 0;
          if (pct > 100) pct = 100;
          snprintf(bat_top, sizeof(bat_top), "BAT:%d%%", pct);
        } else {
          snprintf(bat_top, sizeof(bat_top), "BAT:--");
        }
        // 电池信息（不加粗）
        it.print(w - 12, 6, id(font_label), fg, TextAlign::TOP_RIGHT, bat_top);
        it.filled_rectangle(12, 28, 36, 2, fg);
        it.filled_rectangle(w - 48, 28, 36, 2, fg);

        const char* status_text = "IDLE";
        if (st == 1) { status_text = "GEN"; }
        if (st == 2) { status_text = "BUILD"; }
        if (st == 3) { status_text = "OK"; }
        if (st == 4) { status_text = "ERR"; }
        // 状态文字（加粗）
        it.print(w / 2, 36, id(font_display), fg, TextAlign::TOP_CENTER, status_text);
        it.print(w / 2 + 1, 37, id(font_display), fg, TextAlign::TOP_CENTER, status_text);

        char dur[48];
        if (st == 1 || st == 2) {
          snprintf(dur, sizeof(dur), "ELAPSED: %ds", (int)id(g_work_duration));
        } else if (st == 3 || st == 4) {
          snprintf(dur, sizeof(dur), "DONE: %ds", (int)id(g_work_duration));
        } else {
          snprintf(dur, sizeof(dur), "READY");
        }
        // 耗时（不加粗）
        it.print(w / 2, 80, id(font_label), fg, TextAlign::TOP_CENTER, dur);

        it.filled_rectangle(8, 100, w - 16, 2, fg);

        if (st == 1 || st == 2) {
          int bar_x = 32;
          int bar_w = w - 64;
          int bar_y = 108;
          int bar_h = 20;
          it.filled_rectangle(bar_x, bar_y, bar_w, 2, fg);
          it.filled_rectangle(bar_x, bar_y + bar_h - 2, bar_w, 2, fg);
          it.filled_rectangle(bar_x, bar_y, 2, bar_h, fg);
          it.filled_rectangle(bar_x + bar_w - 2, bar_y, 2, bar_h, fg);
          int progress = (id(g_work_duration) * 5) % 100;
          if (progress < 5) progress = 5;
          if (progress > 95) progress = 95;
          int fill_w = (bar_w - 8) * progress / 100;
          for (int i = 0; i < fill_w; i += 4) {
            it.filled_rectangle(bar_x + 4 + i, bar_y + 4, 3, bar_h - 8, fg);
          }
          char pct[8];
          snprintf(pct, sizeof(pct), "%d%%", progress);
          // 进度百分比（不加粗）
          it.print(w / 2, bar_y + bar_h + 8, id(font_label), fg, TextAlign::TOP_CENTER, pct);
        } else if (st == 3) {
          // SUCCESS（加粗）
          it.print(w / 2, 112, id(font_body), fg, TextAlign::TOP_CENTER, "SUCCESS");
          it.print(w / 2 + 1, 113, id(font_body), fg, TextAlign::TOP_CENTER, "SUCCESS");
        } else if (st == 4) {
          // ERROR（加粗）
          it.print(w / 2, 112, id(font_body), fg, TextAlign::TOP_CENTER, "ERROR");
          it.print(w / 2 + 1, 113, id(font_body), fg, TextAlign::TOP_CENTER, "ERROR");
        }

        it.filled_rectangle(8, 160, w - 16, 2, fg);
        char proj[64];
        snprintf(proj, sizeof(proj), "%s :: %s", id(g_project).c_str(), id(g_branch).c_str());
        // 项目信息（不加粗）
        it.print(w / 2, 168, id(font_label), fg, TextAlign::TOP_CENTER, proj);

        it.filled_rectangle(8, 192, w - 16, 2, fg);
        // 操作提示（不加粗）
        if (st == 0) {
          it.print(w / 2, 200, id(font_label), fg, TextAlign::TOP_CENTER, "KEY LONG > START");
        } else if (st == 3) {
          it.print(w / 2, 200, id(font_label), fg, TextAlign::TOP_CENTER, "KEY > CONTINUE");
        } else if (st == 4) {
          it.print(w / 2, 200, id(font_label), fg, TextAlign::TOP_CENTER, "KEY > RETRY");
        } else {
          it.print(w / 2, 200, id(font_label), fg, TextAlign::TOP_CENTER, "KEY > CANCEL");
        }

        it.filled_rectangle(8, 232, w - 16, 2, fg);
        // 底部提示（不加粗）
        it.print(w / 2, 240, id(font_footer), fg, TextAlign::TOP_CENTER, "BOOT=MODE");
        it.print(w / 2, 260, id(font_footer), fg, TextAlign::TOP_CENTER, "LONG BOOT > LIFE");
      }

binary_sensor:
  - platform: gpio
    id: btn_boot
    name: "Boot Button"
    pin:
      number: GPIO0
      inverted: true
      mode: INPUT_PULLUP
    on_click:
      - min_length: 50ms
        max_length: 1000ms
        then:
          - lambda: |-
              uint8_t mode = id(g_mode);
              if (mode == 0) {
                id(g_todo_idx) = (id(g_todo_idx) + 1) % 3;
              } else {
                id(g_work_status) = (id(g_work_status) + 1) % 5;
                id(g_work_duration) = 0;
              }
          - component.update: my_display
    on_multi_click:
      - timing:
          - ON for at least 1.2s
        then:
          - lambda: |-
              id(g_mode) = !id(g_mode);
              id(g_todo_idx) = 0;
          - component.update: my_display

  - platform: gpio
    id: btn_key
    name: "Key Button"
    pin:
      number: GPIO18
      inverted: true
      mode: INPUT
    on_click:
      - min_length: 50ms
        max_length: 1000ms
        then:
          - lambda: |-
              uint8_t mode = id(g_mode);
              if (mode == 0) {
                uint8_t idx = id(g_todo_idx);
                id(g_todo_state) ^= (1 << idx);
              } else {
                id(g_work_status) = 0;
                id(g_work_duration) = 0;
              }
          - component.update: my_display
    on_multi_click:
      - timing:
          - ON for at least 1.2s
        then:
          - lambda: |-
              uint8_t mode = id(g_mode);
              if (mode == 1) {
                id(g_work_status) = 2;
                id(g_work_duration) = 0;
              }
          - component.update: my_display

interval:
  - interval: 1s
    then:
      - lambda: |-
          uint8_t st = id(g_work_status);
          if (st == 1 || st == 2) {
            id(g_work_duration)++;
          }
