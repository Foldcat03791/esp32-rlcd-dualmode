esphome:
  name: rlcd-dualmode
  friendly_name: "RLCD Dual Mode"

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

logger:
  level: INFO

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "RLCD-Fallback"
    password: "12345678"

captive_portal:

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

spi:
  clk_pin: GPIO11
  mosi_pin: GPIO12

i2c:
  sda: GPIO13
  scl: GPIO14
  scan: true
  id: bus_a

external_components:
  - source:
      type: local
      path: ./ESPHome-ST7305-RLCD/components
    components: [ st7305_rlcd ]
    refresh: 0s

time:
  - platform: pcf85063
    id: my_time
    update_interval: 60s

sensor:
  - platform: shtcx
    address: 0x70
    update_interval: 60s
    i2c_id: bus_a
    temperature:
      name: "Temperature"
      id: temp_sensor
    humidity:
      name: "Humidity"
      id: hum_sensor

  - platform: adc
    id: bat_voltage
    name: "Battery Voltage"
    pin: GPIO4
    attenuation: 12db
    update_interval: 60s
    filters:
      - multiply: 3.0

globals:
  - id: g_mode
    type: uint8_t
    initial_value: "0"

  - id: g_work_status
    type: uint8_t
    initial_value: "0"

  - id: g_work_duration
    type: uint16_t
    initial_value: "0"

  - id: g_project
    type: std::string
    initial_value: "\"rlcd-project\""

  - id: g_branch
    type: std::string
    initial_value: "\"main\""

  - id: g_todo_idx
    type: uint8_t
    initial_value: "0"

  - id: g_todo_state
    type: uint8_t
    initial_value: "0"

  - id: g_blink
    type: bool
    initial_value: "false"

font:
  - file: "gfonts://Roboto"
    id: font_display
    size: 64
    bpp: 2

  - file: "gfonts://Roboto"
    id: font_headline
    size: 26
    bpp: 2

  - file: "gfonts://Roboto"
    id: font_body
    size: 20
    bpp: 2

  - file: "gfonts://Roboto"
    id: font_caption
    size: 14
    bpp: 2

display:
  - platform: st7305_rlcd
    model: WAVESHARE_400X300
    id: my_display
    cs_pin: GPIO40
    dc_pin: GPIO5
    reset_pin: GPIO41
    data_rate: 1MHz
    update_interval: 60s
    lambda: |-
      uint8_t mode = id(g_mode);
      uint8_t st = id(g_work_status);
      auto bg = (mode == 1) ? COLOR_ON : COLOR_OFF;
      auto fg = (mode == 1) ? COLOR_OFF : COLOR_ON;

      if (mode == 1 && st == 4 && id(g_blink)) {
        bg = COLOR_OFF;
        fg = COLOR_ON;
      }

      it.fill(bg);

      if (mode == 0) {
        auto now = id(my_time).now();

        it.print(12, 12, id(font_caption), fg, TextAlign::TOP_LEFT, "RLCD-LIFE");

        uint8_t pending = 3 - ((id(g_todo_state)&1) + ((id(g_todo_state)>>1)&1) + ((id(g_todo_state)>>2)&1));
        char cnt[16];
        snprintf(cnt, sizeof(cnt), "[%d]", pending);
        it.print(385, 12, id(font_caption), fg, TextAlign::TOP_RIGHT, cnt);

        it.line(8, 32, 392, 32, fg);

        if (now.is_valid()) {
          char buf[16];
          snprintf(buf, sizeof(buf), "%02d:%02d", now.hour, now.minute);
          it.print(200, 75, id(font_display), fg, TextAlign::CENTER, buf);
        } else {
          it.print(200, 75, id(font_display), fg, TextAlign::CENTER, "--:--");
        }

        if (now.is_valid()) {
          char buf[32];
          snprintf(buf, sizeof(buf), "%04d-%02d-%02d", now.year, now.month, now.day_of_month);
          it.print(200, 145, id(font_headline), fg, TextAlign::CENTER, buf);
        }

        it.line(60, 170, 340, 170, fg);

        char env[48];
        if (id(temp_sensor).has_state() && id(hum_sensor).has_state()) {
          snprintf(env, sizeof(env), "%.1f C    %.0f%%", id(temp_sensor).state, id(hum_sensor).state);
        } else {
          snprintf(env, sizeof(env), "--.- C    --%%");
        }
        it.print(200, 190, id(font_body), fg, TextAlign::CENTER, env);

        it.line(60, 215, 340, 215, fg);

        const char* todos[3] = {"Buy milk", "Review PR", "Submit weekly"};
        int todo_y = 228;
        uint8_t sel = id(g_todo_idx);
        uint8_t done_mask = id(g_todo_state);

        for (int i = 0; i < 3; i++) {
          bool done = (done_mask >> i) & 1;
          char line[48];
          snprintf(line, sizeof(line), "%s %s", done ? "[x]" : "[ ]", todos[i]);

          if (i == sel) {
            it.filled_rectangle(25, todo_y - 1, 350, 22, fg);
            it.print(35, todo_y, id(font_body), bg, TextAlign::TOP_LEFT, line);
          } else {
            it.print(35, todo_y, id(font_body), fg, TextAlign::TOP_LEFT, line);
          }
          todo_y += 24;
        }

        it.line(8, 298, 392, 298, fg);

        char bat[24];
        if (id(bat_voltage).has_state()) {
          snprintf(bat, sizeof(bat), "%.2fV", id(bat_voltage).state);
        } else {
          snprintf(bat, sizeof(bat), "--.--V");
        }
        char bottom[96];
        snprintf(bottom, sizeof(bottom), "%s   B=Next   K=Done", bat);
        it.print(200, 312, id(font_caption), fg, TextAlign::CENTER, bottom);

      } else {
        it.print(12, 12, id(font_caption), fg, TextAlign::TOP_LEFT, "RLCD-WORK");
        it.print(385, 12, id(font_caption), fg, TextAlign::TOP_RIGHT, "[v]");
        it.line(8, 32, 392, 32, fg);

        const char* status_text = "IDLE";
        if (st == 1) status_text = "GENERAT";
        if (st == 2) status_text = "BUILD";
        if (st == 3) status_text = "SUCCESS";
        if (st == 4) status_text = "FAILED";

        it.print(200, 75, id(font_display), fg, TextAlign::CENTER, status_text);

        char dur[48];
        if (st == 1 || st == 2) {
          snprintf(dur, sizeof(dur), "%ds", (int)id(g_work_duration));
        } else if (st == 3 || st == 4) {
          snprintf(dur, sizeof(dur), "done %ds", (int)id(g_work_duration));
        } else {
          snprintf(dur, sizeof(dur), "ready");
        }
        it.print(200, 145, id(font_headline), fg, TextAlign::CENTER, dur);

        it.line(60, 170, 340, 170, fg);

        char proj[96];
        snprintf(proj, sizeof(proj), "%s [%s]", id(g_project).c_str(), id(g_branch).c_str());
        it.print(200, 190, id(font_body), fg, TextAlign::CENTER, proj);

        it.line(8, 298, 392, 298, fg);

        if (st == 4 && id(g_blink)) {
          it.print(200, 312, id(font_caption), fg, TextAlign::CENTER, "B=Next   K=Ack");
        } else {
          it.print(200, 312, id(font_caption), fg, TextAlign::CENTER, "B=Next   K=Cancel");
        }
      }

binary_sensor:
  - platform: gpio
    id: btn_boot
    name: "Boot Button"
    pin:
      number: GPIO0
      inverted: true
      mode: INPUT_PULLUP
    on_click:
      - min_length: 50ms
        max_length: 800ms
        then:
          - lambda: |-
              uint8_t mode = id(g_mode);
              if (mode == 0) {
                id(g_todo_idx) = (id(g_todo_idx) + 1) % 3;
              } else {
                id(g_work_status) = (id(g_work_status) + 1) % 5;
                id(g_work_duration) = 0;
              }
          - component.update: my_display
    on_multi_click:
      - timing:
          - ON for at least 1.2s
        then:
          - lambda: |-
              id(g_mode) = !id(g_mode);
              id(g_todo_idx) = 0;
          - component.update: my_display

  - platform: gpio
    id: btn_key
    name: "Key Button"
    pin:
      number: GPIO18
      inverted: true
      mode: INPUT_PULLUP
    on_click:
      - min_length: 50ms
        max_length: 800ms
        then:
          - lambda: |-
              uint8_t mode = id(g_mode);
              if (mode == 0) {
                uint8_t idx = id(g_todo_idx);
                id(g_todo_state) ^= (1 << idx);
              } else {
                id(g_work_status) = 0;
                id(g_work_duration) = 0;
              }
          - component.update: my_display
    on_multi_click:
      - timing:
          - ON for at least 1.2s
        then:
          - lambda: |-
              uint8_t mode = id(g_mode);
              if (mode == 1) {
                id(g_work_status) = 2;
                id(g_work_duration) = 0;
              }
          - component.update: my_display

interval:
  - interval: 500ms
    then:
      - lambda: id(g_blink) = !id(g_blink);
      - if:
          condition:
            lambda: 'return id(g_mode) == 1 && id(g_work_status) == 4;'
          then:
            - component.update: my_display

  - interval: 1s
    then:
      - lambda: |-
          uint8_t st = id(g_work_status);
          if (st == 1 || st == 2) {
            id(g_work_duration)++;
          }
      - if:
          condition:
            lambda: 'return id(g_mode) == 1 && (id(g_work_status) == 1 || id(g_work_status) == 2);'
          then:
            - component.update: my_display
