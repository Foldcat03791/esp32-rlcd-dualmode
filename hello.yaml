esphome:
  name: rlcd-test
  friendly_name: "RLCD Test"

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

logger:
  level: DEBUG

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "RLCD-Fallback"
    password: "12345678"

captive_portal:

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

spi:
  clk_pin: GPIO11
  mosi_pin: GPIO12

external_components:
  - source:
      type: local
      path: ./ESPHome-ST7305-RLCD/components
    components: [ st7305_rlcd ]
    refresh: 0s

font:
  - file: "gfonts://Roboto"
    id: my_font
    size: 36
    glyphs: 'OTASuces '

display:
  - platform: st7305_rlcd
    model: WAVESHARE_400X300
    id: my_display
    cs_pin: GPIO40
    dc_pin: GPIO5
    reset_pin: GPIO41
    data_rate: 1MHz
    update_interval: 5s
    lambda: |-
      it.fill(COLOR_ON);
      it.print(200, 150, id(my_font), COLOR_OFF, TextAlign::CENTER, "OTA Success");

i2c:
  sda: GPIO13
  scl: GPIO14
  scan: true
  id: bus_a

sensor:
  - platform: shtcx
    address: 0x70
    update_interval: 60s
    i2c_id: bus_a
    temperature:
      name: "Temperature"
      id: temp_sensor
    humidity:
      name: "Humidity"
      id: hum_sensor

  - platform: adc
    id: bat_voltage
    name: "Battery Voltage"
    pin: GPIO4
    attenuation: 12db
    update_interval: 60s
    filters:
      - multiply: 3.0

binary_sensor:
  - platform: gpio
    name: "Boot Button"
    pin:
      number: GPIO0
      inverted: true
      mode: INPUT