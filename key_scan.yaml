esphome:
  name: rlcd-keyscan
  friendly_name: "RLCD Key Scan"

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

logger:
  level: DEBUG
  baud_rate: 115200

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "RLCD-Scan"
    password: "12345678"

captive_portal:

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

spi:
  clk_pin: GPIO11
  mosi_pin: GPIO12

external_components:
  - source:
      type: local
      path: ./ESPHome-ST7305-RLCD/components
    components: [ st7305_rlcd ]

font:
  - file: "gfonts://Roboto"
    id: font_title
    size: 18
    bpp: 2
  - file: "gfonts://Roboto"
    id: font_body
    size: 16
    bpp: 2
  - file: "gfonts://Roboto"
    id: font_big
    size: 24
    bpp: 2

display:
  - platform: st7305_rlcd
    model: WAVESHARE_400X300
    id: my_display
    cs_pin: GPIO40
    dc_pin: GPIO5
    reset_pin: GPIO41
    data_rate: 1MHz
    update_interval: 1s
    lambda: |-
      it.fill(COLOR_OFF);
      it.print(200, 5, id(font_title), COLOR_ON, TextAlign::TOP_CENTER, "=== KEY PIN SCANNER ===");
      it.printf(10, 32, id(font_body), COLOR_ON, "GPIO%d [BOOT] state: %s", 0, id(s_gpio0) ? "PRESSED" : "idle");
      it.printf(10, 56, id(font_body), COLOR_ON, "GPIO%d state: %s", 17, id(s_gpio17) ? "PRESSED" : "idle");
      it.printf(10, 80, id(font_body), COLOR_ON, "GPIO%d state: %s", 18, id(s_gpio18) ? "PRESSED" : "idle");
      it.printf(10, 104, id(font_body), COLOR_ON, "GPIO%d state: %s", 19, id(s_gpio19) ? "PRESSED" : "idle");
      it.printf(10, 128, id(font_body), COLOR_ON, "GPIO%d state: %s", 20, id(s_gpio20) ? "PRESSED" : "idle");
      it.printf(10, 152, id(font_body), COLOR_ON, "GPIO%d [KEY?] state: %s", 21, id(s_gpio21) ? "PRESSED" : "idle");
      it.printf(10, 176, id(font_body), COLOR_ON, "GPIO%d state: %s", 35, id(s_gpio35) ? "PRESSED" : "idle");
      it.printf(10, 200, id(font_body), COLOR_ON, "GPIO%d state: %s", 39, id(s_gpio39) ? "PRESSED" : "idle");
      it.printf(10, 224, id(font_body), COLOR_ON, "GPIO%d state: %s", 46, id(s_gpio46) ? "PRESSED" : "idle");
      it.printf(10, 248, id(font_body), COLOR_ON, "GPIO%d state: %s", 47, id(s_gpio47) ? "PRESSED" : "idle");

      it.line(8, 278, 392, 278, COLOR_ON);
      it.printf(200, 288, id(font_body), COLOR_ON, TextAlign::CENTER,
        "Last pressed: GPIO%d (count=%d)",
        id(g_last_gpio), id(g_press_count));

globals:
  - id: g_last_gpio
    type: int
    initial_value: "-1"
  - id: g_press_count
    type: int
    initial_value: "0"
  - id: s_gpio0
    type: bool
    initial_value: "false"
  - id: s_gpio17
    type: bool
    initial_value: "false"
  - id: s_gpio18
    type: bool
    initial_value: "false"
  - id: s_gpio19
    type: bool
    initial_value: "false"
  - id: s_gpio20
    type: bool
    initial_value: "false"
  - id: s_gpio21
    type: bool
    initial_value: "false"
  - id: s_gpio35
    type: bool
    initial_value: "false"
  - id: s_gpio39
    type: bool
    initial_value: "false"
  - id: s_gpio46
    type: bool
    initial_value: "false"
  - id: s_gpio47
    type: bool
    initial_value: "false"

binary_sensor:
  - platform: gpio
    id: key_gpio0
    pin:
      number: GPIO0
      inverted: true
      mode: INPUT_PULLUP
    on_press:
      then:
        - lambda: |-
            id(s_gpio0) = true;
            id(g_last_gpio) = 0;
            id(g_press_count)++;
            ESP_LOGD("SCAN", "GPIO0 [BOOT] PRESSED (count=%d)", id(g_press_count));
        - component.update: my_display
    on_release:
      then:
        - lambda: id(s_gpio0) = false;
        - component.update: my_display

